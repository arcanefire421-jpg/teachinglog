<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📘 教學日誌生成器 (v0.1)</title>
<style>
/* 確保手機相容性及美觀 (CSS) */
body { font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  background:linear-gradient(180deg,#eff8ff 0%,#fff7ed 48%,#f8fafc 100%);
  margin:0;padding:12px;color:#1f2937;max-width:520px;margin-left:auto;margin-right:auto;}
h1{text-align:center;font-size:1.55rem;margin:12px 0 14px 0;color:#1d4ed8;
  text-shadow:0 1px 0 rgba(255,255,255,.8);}
.card{background:rgba(255,255,255,.96);border:1px solid rgba(148,163,184,.22);
  border-radius:14px;padding:11px 10px;margin-bottom:10px;
  box-shadow:0 8px 22px rgba(37,99,235,0.08);}
label{font-weight:800;display:block;margin-top:6px;margin-bottom:4px;color:#334155;}
input,select,textarea{width:100%;padding:7px 8px;border-radius:8px;font-size:1rem;
  border:1px solid #cbd5e1;box-sizing:border-box;margin-top:2px;background:#ffffff;}
input:focus,select:focus,textarea:focus{outline:3px solid rgba(59,130,246,.16);border-color:#3b82f6;}
textarea{resize:vertical;font-size:1rem;}
button{background:#2563eb;color:white;border:none;border-radius:8px;padding:8px 11px;
  margin-top:8px;cursor:pointer;font-weight:bold;font-size:1rem;margin-right:6px;
  box-shadow:0 4px 10px rgba(37,99,235,.18);}
button.danger{background:#ef4444;}button.green{background:#16a34a;}button.orange{background:#f97316;}
.section{border-top:1px solid #e5e7eb;margin-top:7px;padding-top:7px;}
.chip{display:inline-block;padding:6px 10px;border-radius:999px;border:1px solid #cbd5e1;
  margin:4px 3px 3px 0;background:#e0f2fe;color:#075985;font-size:0.93rem;cursor:pointer;
  font-weight:700;}
.chip:nth-child(3n+2){background:#fef3c7;color:#92400e;}
.chip:nth-child(3n){background:#dcfce7;color:#166534;}
.chip:hover{filter:brightness(.96);transform:translateY(-1px);}
.quick-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
.subject-summary{display:flex;align-items:center;justify-content:space-between;gap:8px;
  background:#eef6ff;border:1px solid #bfdbfe;border-radius:10px;padding:8px 10px;margin-top:6px;}
.subject-summary strong{color:#1d4ed8;}
.link-button{background:#ffffff;color:#2563eb;border:1px solid #bfdbfe;box-shadow:none;
  padding:6px 9px;margin:0;font-size:.9rem;}
.compact-controls{display:none;margin-top:8px;}
.compact-controls.open{display:block;}
.cache-actions{display:flex;justify-content:flex-end;gap:6px;align-items:center;}
.cache-actions button{margin-top:0;}
.cache-list{display:grid;gap:7px;}
.cache-item{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;
  background:#ffffff;border:1px solid #bfdbfe;border-radius:9px;padding:8px 9px;color:#1e40af;}
.cache-text{line-height:1.35;word-break:break-word;}
.cache-delete{background:#fee2e2;color:#b91c1c;border:1px solid #fecaca;box-shadow:none;
  min-width:34px;padding:4px 8px;margin:0;font-size:.9rem;}
.archive-list{display:grid;gap:8px;margin-top:8px;}
.archive-item{background:#ffffff;border:1px solid #dbeafe;border-radius:11px;padding:9px;
  display:grid;gap:7px;}
.archive-title{font-weight:900;color:#1e3a8a;}
.archive-meta{font-size:.86rem;color:#64748b;}
.archive-actions{display:flex;gap:5px;flex-wrap:wrap;}
.archive-actions button{font-size:.9rem;padding:6px 8px;margin:0;box-shadow:none;}
.output{font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;border-radius:12px;
  line-height:1.55;background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);border:1px solid #dbe3ef;padding:18px 16px;margin-top:12px;
  font-size:1rem;letter-spacing:0;box-shadow:0 8px 22px rgba(20,35,70,0.08);}
.output-header{display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:linear-gradient(135deg,#2563eb,#06b6d4);color:#fff;border-radius:11px;
  padding:12px 13px;margin-bottom:12px;}
.output-title{font-size:1.28rem;font-weight:900;margin:0;}
.output-subtitle{font-size:0.92rem;color:#dff6ff;margin-top:3px;}
.output-badge{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.38);
  border-radius:999px;padding:6px 10px;font-weight:800;white-space:nowrap;}
.output-grid{display:grid;gap:8px;}
.output-item{display:grid;grid-template-columns:42px 1fr;gap:10px;align-items:start;
  padding:10px;border-radius:11px;border:1px solid #e2e8f0;background:#ffffff;}
.output-item.class{background:#fff7ed;border-color:#fed7aa;}
.output-item.date{background:#eff6ff;border-color:#bfdbfe;}
.output-item.progress{background:#f0fdf4;border-color:#bbf7d0;}
.output-item.pages{background:#f8fafc;border-color:#cbd5e1;}
.output-item.quiz{background:#fefce8;border-color:#fde68a;}
.output-item.homework{background:#fdf2f8;border-color:#fbcfe8;}
.output-icon{display:grid;place-items:center;width:34px;height:34px;border-radius:10px;
  background:#e0f2fe;font-size:1.15rem;}
.output-item.class .output-icon{background:#fed7aa;}
.output-item.date .output-icon{background:#bfdbfe;}
.output-item.progress .output-icon{background:#bbf7d0;}
.output-item.pages .output-icon{background:#e2e8f0;}
.output-item.quiz .output-icon{background:#fde68a;}
.output-item.homework .output-icon{background:#fbcfe8;}
.output-label{font-weight:900;color:#334155;white-space:nowrap;margin-bottom:2px;}
.output-value{color:#111827;white-space:pre-wrap;word-break:break-word;}
.output-progress{padding-left:0;margin:0;list-style:none;}
.output-progress li{padding:6px 8px;margin:4px 0;border-radius:8px;background:rgba(255,255,255,.72);
  border:1px solid rgba(34,197,94,.18);}
.output.compact{padding:12px;font-size:.95rem;width:max-content;max-width:100%;margin-left:0;margin-right:auto;}
.output.compact .output-header{padding:9px 10px;margin-bottom:8px;}
.output.compact .output-title{font-size:1.08rem;}
.output.compact .output-subtitle{font-size:.84rem;}
.output.compact .output-badge{padding:4px 8px;font-size:.85rem;}
.output.compact .output-grid{gap:5px;}
.output.compact .output-item{grid-template-columns:28px 72px 1fr;gap:7px;align-items:center;
  padding:6px 8px;border-radius:9px;}
.output.compact .output-icon{width:24px;height:24px;border-radius:7px;font-size:.92rem;}
.output.compact .output-label{margin:0;font-size:.95rem;}
.output.compact .output-value{line-height:1.35;}
.output.compact .output-progress li{padding:3px 6px;margin:2px 0;}
@media (max-width:520px){
  body{padding:4px;}
  .output{font-size:1rem;padding:14px 12px;}
  .output-item{grid-template-columns:1fr;gap:4px;}
  .output.compact .output-item{grid-template-columns:26px 64px 1fr;}
  input,select,textarea{font-size:1.01rem;}
}
.select-group { display: flex; gap: 5px; }
.select-group select { width: 33.33%; margin-top: 0; }
.select-group + input { margin-top: 5px; }
.button-row { display: flex; gap: 5px; margin-top: 10px; flex-wrap:wrap; }
.button-row button { margin-top: 0; margin-right: 0; flex-grow: 1; width: auto; }
.split-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:end;}
.split-row label{margin-top:0;}
.split-row input,.split-row select{margin-top:2px;}
.unit-row{ display: flex; align-items: flex-start; margin-top: 5px; line-height: 1.2; }
.unit-row input[type=checkbox]{ width: auto; margin: 2px 5px 0 0; transform: scale(1.1); flex-shrink: 0; }
.unit-label{ flex: 1; display: inline; margin-top: 0; }
#progressCache { margin-top: 10px; border: 1px dashed #2563eb; background: #f0f7ff; padding: 10px; border-radius: 10px; max-height: 190px; overflow-y: auto; font-size: 0.95rem; }
</style>
</head>
<body>
<h1>📘 教學日誌生成器 (v0.1)</h1>

<div class="card">
  <label>🏫 班級模板</label>
  <div class="select-group">
    <select id="gradeSelect" onchange="syncProgressFromTemplate()">
      <option>小一</option>
      <option>小二</option>
      <option>小三</option>
      <option>小四</option>
      <option>小五</option>
      <option>小六</option>
      <option>國一</option>
      <option>國二</option>
      <option>國三</option>
      <option>高一</option>
      <option>高二</option>
      <option>高三</option>
    </select>
    <select id="subjectSelect" onchange="syncProgressFromTemplate()">
      <option>國文</option>
      <option>英文</option>
      <option>數學</option>
      <option>社會</option>
      <option>自然</option>
      <option>物理</option>
      <option>化學</option>
      <option>生物</option>
      <option>地科</option>
      <option>歷史</option>
      <option>地理</option>
      <option>公民</option>
      <option>其他</option>
    </select>
    <select id="classTypeSelect" onchange="syncProgressFromTemplate()">
      <option>進度</option>
      <option>輔導</option>
      <option>總複習</option>
    </select>
  </div>
  <input id="customClassName" placeholder="或自訂班級名稱（可空白）">
  <button class="green" onclick="addTemplate()">＋新增模板</button>
  <button onclick="fillTemplate()">填入班名</button>
  <button class="danger" onclick="clearTemplates(true)">全清模板</button>
  <div id="templateList" style="margin-top:5px;"></div>
</div>

<div class="card">
  <label>🗓️ 日期</label>
  <div style="display:flex;gap:7px;flex-wrap:wrap;">
    <input id="dateInput" placeholder="自動今日">
    <button onclick="setToday()">今天</button>
    <button onclick="setTomorrow()">明天</button>
  </div>
</div>

<div class="card">
  <label>📚 科目 / 進度選單</label>
  <div class="subject-summary">
    <div>目前：<strong id="subjectSummary">自動帶入</strong></div>
    <button type="button" class="link-button" onclick="toggleSubjectControls()">更改科目</button>
  </div>
  <div id="subjectControls" class="compact-controls">
    <select id="levelFilter" onchange="loadBooks()">
      <option value="">全部學制</option>
      <option value="國小">國小</option>
      <option value="國中">國中</option>
      <option value="高中">高中</option>
    </select>
    <select id="subject" onchange="loadBooks()">
      <option value="">--選科目--</option>
      <option value="chinese">國文</option>
      <option value="english">英文</option>
      <option value="math">數學</option>
      <option value="society">社會</option>
      <option value="science">自然</option>
      <option value="physics">物理</option>
      <option value="chemistry">化學</option>
      <option value="biology">生物</option>
      <option value="earth">地科</option>
      <option value="history">歷史</option>
      <option value="geography">地理</option>
      <option value="civics">公民</option>
      <option value="other">其他</option>
    </select>
  </div>

  <div class="section">
    <label>🔎 搜尋進度</label>
    <input id="progressSearch" placeholder="輸入章節關鍵字，例如：牛頓、二元一次、生殖" oninput="searchProgress()">
    <div id="searchResults" style="margin-top:8px;"></div>
  </div>

  <div id="bookArea" class="section">
  </div>

  <div class="section">
    <label>✏️ 自訂進度</label>
    <input id="customProgressPath" placeholder="例：段考檢討 / 講義補充 / 第3回">
    <input id="customProgressTopic" placeholder="例：錯題訂正、考前複習（可空白）">
    <div class="quick-row">
      <span class="chip" onclick="appendCustomProgress('段考檢討')">段考檢討</span>
      <span class="chip" onclick="appendCustomProgress('考前複習')">考前複習</span>
      <span class="chip" onclick="appendCustomProgress('講義補充')">講義補充</span>
      <span class="chip" onclick="appendCustomProgress('錯題訂正')">錯題訂正</span>
      <span class="chip" onclick="appendCustomProgress('題型演練')">題型演練</span>
    </div>
    <button class="green" onclick="addCustomProgress()">＋加入自訂進度</button>
  </div>

  <div id="cacheArea" class="section cache-actions">
      <button class="orange" onclick="addToCache()">➡️ 存入暫存區</button>
      <button class="danger" onclick="clearCache(true)">🗑️ 清空暫存</button>
  </div>

  <label style="margin-top: 10px;">💾 已選進度暫存區</label>
  <div id="progressCache">目前無暫存進度。</div>
</div>

<div class="card">
  <div class="section">
    <label>📄 頁數</label>
    <input id="pages" placeholder="例：p.45~52">
    <div class="quick-row">
      <span class="chip" onclick="appendPages('p. ')">p. </span>
      <span class="chip" onclick="appendPages('p. 5~8')">p. 5~8</span>
      <span class="chip" onclick="appendPages('p. 10~15')">p. 10~15</span>
      <span class="chip" onclick="appendPages('p. 25~30')">p. 25~30</span>
      <span class="chip" onclick="appendPages('p. 50~55')">p. 50~55</span>
    </div>
  </div>
  <div class="section">
    <label>🧾 小考</label>
    <input id="quiz" placeholder="例：第2章小考">
    <div class="quick-row">
      <span class="chip" onclick="appendFieldText('quiz','隨堂小考')">隨堂小考</span>
      <span class="chip" onclick="appendFieldText('quiz','第1章小考')">第1章小考</span>
      <span class="chip" onclick="appendFieldText('quiz','單字小考')">單字小考</span>
      <span class="chip" onclick="appendFieldText('quiz','公式測驗')">公式測驗</span>
      <span class="chip" onclick="appendFieldText('quiz','無')">無</span>
    </div>
  </div>
  <div class="section">
    <label>🏠 回家作業</label>
    <textarea id="homework" rows="2" placeholder="例：講義 p.53~55＋習題"></textarea>
    <div class="quick-row">
      <span class="chip" onclick="appendHomework('完成講義')">完成講義</span>
      <span class="chip" onclick="appendHomework('訂正錯題')">訂正錯題</span>
      <span class="chip" onclick="appendHomework('複習今日進度')">複習今日進度</span>
      <span class="chip" onclick="appendHomework('預習下次範圍')">預習下次範圍</span>
      <span class="chip" onclick="appendHomework('背誦重點')">背誦重點</span>
    </div>
    <div id="sentenceChips"></div>
    <input id="newSentence" placeholder="加到常用作業句庫（右鍵刪）">
    <button class="green" onclick="addSentence()">＋句庫</button>
  </div>
</div>

<div class="card">
  <div class="button-row">
    <select id="outputStyle" style="width:auto;min-width:120px;">
      <option value="original">原始輸出</option>
      <option value="compact">緊密輸出</option>
    </select>
    <button class="orange" onclick="generate()">🚀 產生</button>
    <button onclick="copyOutput()">📋 複製</button>
    <button class="green" onclick="saveOutputImage()">🖼️ 另存圖片</button>
    <button class="danger" onclick="clearAll(true)">🧹 清空</button>
  </div>
  <div id="output" class="output" style="display:none"></div>
</div>

<div class="card">
  <label>🗂️ 最近存檔</label>
  <div class="quick-row">
    <button onclick="saveCurrentArchive()">💾 存目前日誌</button>
    <select id="archiveGroupBy" onchange="renderArchives()" style="width:auto;min-width:130px;">
      <option value="date">依日期分類</option>
      <option value="class">依班級分類</option>
      <option value="subject">依科目分類</option>
    </select>
    <button class="danger" onclick="clearArchives(true)">清空存檔</button>
  </div>
  <div id="archiveList" class="archive-list">目前沒有存檔。</div>
</div>

<script>
// ================ 1. 內建課程資料 (不用外部檔案) ================

function mergeBookData(target, source) {
  Object.keys(source).forEach(subjectKey => {
    target[subjectKey] = target[subjectKey] || {};
    Object.keys(source[subjectKey]).forEach(bookName => {
      if (!target[subjectKey][bookName]) {
        target[subjectKey][bookName] = source[subjectKey][bookName];
      }
    });
  });
}
mergeBookData(BOOKS, QUESTION_BANK_BOOKS);

function deriveSocietySubject(targetKey, keyword) {
  BOOKS[targetKey] = BOOKS[targetKey] || {};
  const societyBooks = BOOKS.society || {};
  Object.keys(societyBooks).forEach(bookName => {
    const chapters = societyBooks[bookName] || {};
    const matchedChapters = {};
    Object.keys(chapters).forEach(chapterName => {
      if (chapterName.includes(keyword)) {
        matchedChapters[chapterName] = chapters[chapterName];
      }
    });
    if (Object.keys(matchedChapters).length > 0) {
      BOOKS[targetKey][bookName] = matchedChapters;
    }
  });
}

function safeJSONParse(key, defaultValue) {
    try {
        const item = localStorage.getItem(key);
        return item ? JSON.parse(item) : defaultValue;
    } catch (e) {
        console.warn(`localStorage 資料 '${key}' 損毀，已重設。`, e);
        localStorage.removeItem(key);
        return defaultValue;
    }
}

let sentences = safeJSONParse('homeworkSentences', ["講義 p.X~Y", "習題卷", "考卷訂正", "複習指定範圍"]);
let archives = safeJSONParse('teachingLogArchives', []);
let currentArchivePayload = null;

function saveCache() { localStorage.setItem('teachingLogCache', JSON.stringify(progressCache)); renderCache(); }
function saveArchives() { localStorage.setItem('teachingLogArchives', JSON.stringify(archives)); renderArchives(); }

function renderCache() {
    const cacheDiv = document.getElementById('progressCache');
    if (!cacheDiv) return;
    if (progressCache.length === 0) {
        cacheDiv.innerHTML = '目前無暫存進度。';
        return;
    }
    const groupedCache = new Map();
    progressCache.forEach(item => {
        const path = item.path;
        if (groupedCache.has(path)) {
            if (!groupedCache.get(path).includes(item.topic)) {
                 groupedCache.get(path).push(item.topic);
            }
        } else {
            groupedCache.set(path, [item.topic]);
        }
    });

    let html = '<div class="cache-list">';
    groupedCache.forEach((topics, path) => {
        const combinedTopics = topics.join(' ＋ ');
        const pathParts = path.split(' / ');
        const lastPart = pathParts.slice(-1)[0];
        const isPathOnly = topics.length === 1 && topics[0] === lastPart;
        
        const displayPath = displayProgressPath(path);
        const deleteButton = `<button type="button" class="cache-delete" onclick="deleteCachePath('${encodeURIComponent(path)}')">刪</button>`;
        if (isPathOnly) {
             html += `<div class="cache-item"><div class="cache-text">‧ ${htmlEscape(displayPath)}</div>${deleteButton}</div>`;
        } else {
             html += `<div class="cache-item"><div class="cache-text">‧ ${htmlEscape(displayPath)} <br> (${htmlEscape(combinedTopics)})</div>${deleteButton}</div>`;
        }
    });
    html += '</div>';
    cacheDiv.innerHTML = html;
}

function deleteCachePath(encodedPath) {
    const path = decodeURIComponent(encodedPath);
    progressCache = progressCache.filter(item => item.path !== path);
    saveCache();
}

function addToCache() {
    let itemsToCache = [];
    const checks = document.querySelectorAll("#topicArea input[type=checkbox]:checked, #searchResults input[type=checkbox]:checked");

    if (checks.length > 0) {
        checks.forEach(cb => {
            itemsToCache.push({ path: cb.value, topic: cb.dataset.topicName });
            cb.checked = false; 
        });
    } else {
        const subjectSelect = document.getElementById('subject');
        const subjectKey = subjectSelect ? subjectSelect.value : '';
        const subjectName = subjectSelect ? subjectSelect.options[subjectSelect.selectedIndex].text : '';
        const bookSelect = document.getElementById('bookSelect');
        const chapterSelect = document.getElementById('chapterSelect');
        const sectionSelect = document.getElementById('sectionSelect');

        const selectedBookName = bookSelect ? bookSelect.value : '';
        const manualBookName = document.getElementById('manualBookInput') ? document.getElementById('manualBookInput').value.trim() : '';
        const bookName = manualBookName || selectedBookName;
        const isManualBook = !!manualBookName;
        const selectedChapterName = chapterSelect ? chapterSelect.value : '';
        const manualChapterName = document.getElementById('manualChapterInput') ? document.getElementById('manualChapterInput').value.trim() : '';
        const chapterName = manualChapterName || selectedChapterName;
        const sectionName = sectionSelect ? sectionSelect.value : '';

        let progressPath = '';
        let progressName = '';

        if (subjectKey) {
            if (sectionName) {
                const cleanBook = cleanSelectedOrManualBook(bookName, isManualBook);
                progressPath = [cleanBook, chapterName, sectionName].filter(Boolean).join(' / ');
                progressName = sectionName;
            } else if (chapterName) {
                const cleanBook = cleanSelectedOrManualBook(bookName, isManualBook);
                progressPath = [cleanBook, chapterName].filter(Boolean).join(' / ');
                progressName = chapterName;
            } else if (bookName) {
                progressPath = `${cleanSelectedOrManualBook(bookName, isManualBook)}`;
                progressName = progressPath;
            }
        }
        if (progressPath && progressName) {
            itemsToCache.push({ path: progressPath, topic: progressName });
        }
        if (itemsToCache.length === 0) {
            alert("請先選擇進度");
            return;
        }
    }

    itemsToCache.forEach(item => {
        const isDuplicate = progressCache.some(p => p.path === item.path && p.topic === item.topic);
        if (!isDuplicate) {
            progressCache.push(item);
        }
    });
    saveCache();
}

function addCustomProgress() {
    const pathInput = document.getElementById('customProgressPath');
    const topicInput = document.getElementById('customProgressTopic');
    const path = pathInput ? pathInput.value.trim() : '';
    const topic = topicInput && topicInput.value.trim() ? topicInput.value.trim() : path;
    if (!path) {
        alert("請先輸入自訂進度");
        return;
    }
    const isDuplicate = progressCache.some(p => p.path === path && p.topic === topic);
    if (!isDuplicate) progressCache.push({ path, topic });
    if (pathInput) pathInput.value = '';
    if (topicInput) topicInput.value = '';
    saveCache();
}

function clearCache(showConfirm = false) {
    if (showConfirm && !confirm("確定要清空所有暫存區的進度嗎？")) return;
    progressCache = [];
    saveCache();
}

// ================ 級聯選單功能 ================
function htmlEscape(value) {
    return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

function selectedLevelPrefix() {
    const levelSelect = document.getElementById('levelFilter');
    return levelSelect ? levelSelect.value : '';
}

function selectedSubjectLabel() {
    const subjectSelect = document.getElementById('subject');
    if (!subjectSelect || !subjectSelect.value) return '';
    const option = subjectSelect.options[subjectSelect.selectedIndex];
    return option ? option.text : '';
}

function updateSubjectSummary() {
    const summary = document.getElementById('subjectSummary');
    if (!summary) return;
    const level = selectedLevelPrefix();
    const subject = selectedSubjectLabel();
    summary.textContent = [level, subject].filter(Boolean).join(' / ') || '未選擇';
}

function toggleSubjectControls() {

}

function bookMatchesLevel(bookName) {
    const level = selectedLevelPrefix();
    if (!level) return true;
    if (!/^(國小|國中|高中)/.test(bookName)) return level === '高中';
    return bookName.startsWith(level);
}

function usesDefaultHighScience(subjectKey, bookName) {
    const defaultSubjects = ['physics', 'chemistry', 'biology', 'earth'];
    return selectedLevelPrefix() === '高中'
        && defaultSubjects.includes(subjectKey)
        && !/^(國小|國中|高中)/.test(bookName);
}

function displayBookName(bookName) {
    return String(bookName || '')
        .replace(/^(國小|國中|高中)/, '')
        .replace(/^(三民|全華|南一|泰宇|康軒|康熹|翰林|龍騰|適南|適康|通用|綜合)版/, '')
        .replace(/（\d+學年）|\(\d+學年\)/g, '')
        .replace(/第(\d+)冊/g, (_, num) => `第${numberToChinese(Number(num))}冊`)
        .trim();
}

function displayBookNameForSubject(bookName, subjectKey) {
    const displayName = displayBookName(bookName);
    if (subjectKey !== 'science' || selectedLevelPrefix() !== '國中') return displayName;
    const juniorNaturalMap = {
        '第一冊': '生物第一冊',
        '第二冊': '生物第二冊',
        '第三冊': '理化第一冊',
        '第四冊': '理化第二冊',
        '第五冊': '理化第三冊',
        '第六冊': '理化第四冊',
    };
    return juniorNaturalMap[displayName] || displayName;
}

function numberToChinese(num) {
    const digits = ['', '一', '二', '三', '四', '五', '六', '七', '八', '九'];
    if (!Number.isFinite(num) || num <= 0) return String(num);
    if (num < 10) return digits[num];
    if (num === 10) return '十';
    if (num < 20) return `十${digits[num - 10]}`;
    const tens = Math.floor(num / 10);
    const ones = num % 10;
    return `${digits[tens]}十${digits[ones] || ''}`;
}

function chineseNumberValue(text) {
    const map = { '一': 1, '二': 2, '三': 3, '四': 4, '五': 5, '六': 6, '七': 7, '八': 8, '九': 9, '十': 10 };
    if (!text) return 999;
    if (/^\d+$/.test(text)) return Number(text);
    if (text === '十') return 10;
    if (text.startsWith('十')) return 10 + (map[text.slice(1)] || 0);
    if (text.includes('十')) {
        const [tens, ones] = text.split('十');
        return (map[tens] || 1) * 10 + (map[ones] || 0);
    }
    return map[text] || 999;
}

function bookSortValue(displayName) {
    const name = displayName || '';
    let match = name.match(/^生物([一二三四五六七八九十\d]+)冊/);
    if (match) return 10 + chineseNumberValue(match[1]);
    match = name.match(/^理化([一二三四五六七八九十\d]+)冊/);
    if (match) return 20 + chineseNumberValue(match[1]);
    match = name.match(/第([一二三四五六七八九十\d]+)冊/);
    if (match) return chineseNumberValue(match[1]);
    match = name.match(/第([一二三四五六七八九十\d]+)本/);
    if (match) return chineseNumberValue(match[1]);
    match = name.match(/選修\s*\(?\s*([IVX]+|\d+|[一二三四五六七八九十]+)\s*\)?/i);
    if (match) {
        const roman = { I: 1, II: 2, III: 3, IV: 4, V: 5, VI: 6 };
        const key = match[1].toUpperCase();
        return 100 + (roman[key] || chineseNumberValue(match[1]));
    }
    if (name.includes('總複習')) return 900;
    return 800;
}

function getBookGroups(subjectKey) {
    const groups = new Map();
    let bookNames = Object.keys(BOOKS[subjectKey] || {}).filter(bookMatchesLevel);
    if (['physics', 'chemistry', 'biology', 'earth'].includes(subjectKey) && selectedLevelPrefix() === '高中') {
        bookNames = bookNames.filter(bookName => usesDefaultHighScience(subjectKey, bookName));
    }
    bookNames.forEach(bookName => {
        const display = displayBookNameForSubject(bookName, subjectKey);
        if (!groups.has(display)) groups.set(display, []);
        groups.get(display).push(bookName);
    });
    return Array.from(groups.entries())
        .map(([display, names]) => ({ display, names }))
        .sort((a, b) => {
            const diff = bookSortValue(a.display) - bookSortValue(b.display);
            return diff || a.display.localeCompare(b.display, 'zh-Hant');
        });
}

function mergedBookChapters(subjectKey, bookValue) {
    const bookNames = String(bookValue || '').split('||').filter(Boolean);
    const merged = {};
    bookNames.forEach(bookName => {
        const chapters = BOOKS[subjectKey]?.[bookName] || {};
        Object.keys(chapters).forEach(chapterName => {
            if (!merged[chapterName]) {
                merged[chapterName] = chapters[chapterName];
            } else {
                merged[chapterName] = Object.assign({}, merged[chapterName], chapters[chapterName]);
            }
        });
    });
    return merged;
}

function displayProgressPath(path) {
    const subjectKey = document.getElementById('subject')?.value || '';
    return String(path || '')
        .split(' / ')
        .map((part, index) => index === 0 ? displayBookNameForSubject(part, subjectKey) : part)
        .join(' / ');
}

function cleanSelectedOrManualBook(bookName, isManual) {
    const subjectKey = document.getElementById('subject')?.value || '';
    if (!bookName) return '';
    return isManual ? bookName : displayBookNameForSubject(String(bookName).split('||')[0], subjectKey);
}

function resetLowerProgressAreas() {
    ['sectionSelectArea', 'topicArea'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.innerHTML = '';
    });
}

function renderChapterControls(chapters = []) {
    const options = chapters.length
        ? chapters.map(c => `<option value="${htmlEscape(c)}">${htmlEscape(c)}</option>`).join('')
        : '';
    return `<div class="split-row">
              <div>
                <label>📑 章節</label>
                <select id="chapterSelect" onchange="loadSections()" ${chapters.length ? '' : 'disabled'}>
                  <option value="">--選章節--</option>
                  ${options}
                </select>
              </div>
              <div>
                <label>手動章節</label>
                <input id="manualChapterInput" placeholder="例：第5單元_多位數的乘除">
              </div>
            </div>`;
}

function loadBooks() {
    const subjectKey = document.getElementById('subject').value;
    const bookArea = document.getElementById('bookArea');
    if (!bookArea) return;
    updateSubjectSummary();
    bookArea.innerHTML = '';
    searchProgress();

    if (!subjectKey || !BOOKS[subjectKey]) return;

    const bookGroups = getBookGroups(subjectKey);
    if (bookGroups.length === 0) {
        bookArea.innerHTML = '<div class="cache-item">此學制目前沒有這個科目的進度資料。</div>';
        return;
    }
    let html = `<div class="split-row">
                  <div>
                    <label>📖 冊別</label>
                    <select id="bookSelect" onchange="loadChapters()">
                      <option value="">--選冊別--</option>
                      ${bookGroups.map(group => `<option value="${htmlEscape(group.names.join('||'))}">${htmlEscape(group.display)}</option>`).join('')}
                    </select>
                  </div>
                  <div>
                    <label>手動冊別</label>
                    <input id="manualBookInput" placeholder="例：第九冊">
                  </div>
                </div>`;
    html += `<div id="chapterSelectArea" style="margin-top:10px;">${renderChapterControls()}</div>`;
    html += '<div id="sectionSelectArea" style="margin-top:10px;"></div>';
    html += '<div id="topicArea" style="margin-top:10px;"></div>';
    bookArea.innerHTML = html;
}

function loadChapters() {
    const subjectKey = document.getElementById('subject').value;
    const bookSelect = document.getElementById('bookSelect');
    const bookName = bookSelect ? bookSelect.value : '';
    const chapterArea = document.getElementById('chapterSelectArea');
    if (chapterArea) chapterArea.innerHTML = '';
    resetLowerProgressAreas();
    if (!bookName) return;

    const bookChapters = mergedBookChapters(subjectKey, bookName);
    const chapters = Object.keys(bookChapters);
    chapterArea.innerHTML = renderChapterControls(chapters);
}

function loadSections() {
    const subjectKey = document.getElementById('subject').value;
    const bookSelect = document.getElementById('bookSelect');
    const chapterSelect = document.getElementById('chapterSelect');
    const bookName = bookSelect ? bookSelect.value : '';
    const chapterName = chapterSelect ? chapterSelect.value : '';
    const sectionArea = document.getElementById('sectionSelectArea');
    if (sectionArea) sectionArea.innerHTML = '';
    const topicArea = document.getElementById('topicArea');
    if (topicArea) topicArea.innerHTML = '';
    if (!chapterName) return;

    const bookChapters = mergedBookChapters(subjectKey, bookName);
    const sections = Object.keys(bookChapters[chapterName] || {});
    let html = '<label>📝 小節</label>';
    html += `<select id="sectionSelect" onchange="loadTopics()">
                <option value="">--選小節--</option>
                ${sections.map(s => `<option value="${htmlEscape(s)}">${htmlEscape(s)}</option>`).join('')}
             </select>`;
    sectionArea.innerHTML = html;
}

function loadTopics() {
    const subjectKey = document.getElementById('subject').value;
    const bookName = document.getElementById('bookSelect').value;
    const chapterName = document.getElementById('chapterSelect').value;
    const sectionName = document.getElementById('sectionSelect').value;
    const topicArea = document.getElementById('topicArea');
    if (!topicArea) return;
    topicArea.innerHTML = '';
    if (!sectionName) return;

    const bookChapters = mergedBookChapters(subjectKey, bookName);
    const topics = bookChapters[chapterName]?.[sectionName] || [];
    let html = '<label>✅ 今日進度 (可複選)</label>';
    html += '<div style="max-height: 200px; overflow-y: auto; border: 1px solid #e5e7eb; padding: 8px; border-radius: 8px;">';
    topics.forEach((topic, index) => {
        const progressPath = `${displayBookNameForSubject(bookName.split('||')[0], subjectKey)} / ${chapterName} / ${sectionName}`;
        const uniqueId = `topic-${sectionName.replace(/\s/g, '_')}-${index}`;
        html += `<div class="unit-row">
                   <input type="checkbox" id="${htmlEscape(uniqueId)}" value="${htmlEscape(progressPath)}" data-topic-name="${htmlEscape(topic)}">
                   <label for="${htmlEscape(uniqueId)}" class="unit-label">${htmlEscape(topic)}</label>
                 </div>`;
    });
    html += '</div>';
    topicArea.innerHTML = html;
}

function buildProgressIndex() {
    const subjectSelect = document.getElementById('subject');
    const selectedSubject = subjectSelect ? subjectSelect.value : '';
    const subjectKeys = selectedSubject ? [selectedSubject] : Object.keys(BOOKS);
    const rows = [];
    subjectKeys.forEach(subjectKey => {
        getBookGroups(subjectKey).forEach(group => {
            const bookName = group.display;
            const chapters = mergedBookChapters(subjectKey, group.names.join('||'));
            Object.keys(chapters).forEach(chapterName => {
                const sections = chapters[chapterName] || {};
                Object.keys(sections).forEach(sectionName => {
                    const topics = sections[sectionName] || [];
                    topics.forEach(topic => {
                        const path = `${bookName} / ${chapterName} / ${sectionName}`;
                        rows.push({
                            path,
                            topic,
                            text: `${displayProgressPath(path)} ${topic}`,
                        });
                    });
                });
            });
        });
    });
    return rows;
}

function searchProgress() {
    const input = document.getElementById('progressSearch');
    const results = document.getElementById('searchResults');
    if (!input || !results) return;
    const keyword = input.value.trim().toLowerCase();
    results.innerHTML = '';
    if (!keyword) return;

    const matches = buildProgressIndex()
        .filter(row => row.text.toLowerCase().includes(keyword))
        .slice(0, 30);

    if (matches.length === 0) {
        results.innerHTML = '<div class="cache-item">找不到符合的進度。</div>';
        return;
    }

    let html = '<label>搜尋結果 (可複選)</label>';
    html += '<div style="max-height: 220px; overflow-y: auto; border: 1px solid #e5e7eb; padding: 8px; border-radius: 8px;">';
    matches.forEach((item, index) => {
        const id = `search-topic-${index}`;
        html += `<div class="unit-row">
                   <input type="checkbox" id="${id}" value="${htmlEscape(item.path)}" data-topic-name="${htmlEscape(item.topic)}">
                   <label for="${id}" class="unit-label">${htmlEscape(displayProgressPath(item.path))}<br>(${htmlEscape(item.topic)})</label>
                 </div>`;
    });
    html += '</div>';
    results.innerHTML = html;
}

function formatDate(date) {
  const d = new Date(date);
  const year = d.getFullYear();
  const month = ('0' + (d.getMonth() + 1)).slice(-2);
  const day = ('0' + d.getDate()).slice(-2);
  return `${year}-${month}-${day}`;
}
function setToday(){ document.getElementById("dateInput").value = formatDate(new Date()); }
function setTomorrow(){
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  document.getElementById("dateInput").value = formatDate(tomorrow);
}

function levelFromGrade(grade) {
  if (/^小/.test(grade)) return '國小';
  if (/^國/.test(grade)) return '國中';
  if (/^高/.test(grade)) return '高中';
  return '';
}

function subjectKeyFromName(name) {
  const map = {
    '國文': 'chinese',
    '國語': 'chinese',
    '英文': 'english',
    '英語': 'english',
    '數學': 'math',
    '社會': 'society',
    '自然': 'science',
    '物理': 'physics',
    '化學': 'chemistry',
    '生物': 'biology',
    '地科': 'earth',
    '歷史': 'history',
    '地理': 'geography',
    '公民': 'civics',
    '其他': 'other',
  };
  return map[name] || '';
}

function syncProgressFromTemplate() {
  const grade = document.getElementById("gradeSelect")?.value || "";
  const subjectName = document.getElementById("subjectSelect")?.value || "";
  const level = levelFromGrade(grade);
  const subjectKey = subjectKeyFromName(subjectName);
  const levelSelect = document.getElementById('levelFilter');
  const subjectSelect = document.getElementById('subject');
  if (levelSelect && level) levelSelect.value = level;
  if (subjectSelect && subjectKey) subjectSelect.value = subjectKey;
  loadBooks();
}

function saveSentences() { localStorage.setItem('homeworkSentences', JSON.stringify(sentences)); }
function renderSentences() {
  const list = document.getElementById("sentenceChips");
  if(list) {
      list.innerHTML = sentences.map((s, i) =>
        `<span class="chip" onclick="appendHomework('${s}')" oncontextmenu="deleteSentence(${i}, true); return false;">${s}</span>`
      ).join('');
  }
}
function addSentence() {
  const newS = document.getElementById("newSentence").value.trim();
  if (newS && !sentences.includes(newS)) {
    sentences.push(newS);
    saveSentences();
    renderSentences();
    document.getElementById("newSentence").value = '';
  }
}
function appendHomework(s) {
  const homework = document.getElementById("homework");
  if (homework.value.trim() === '') {
    homework.value = s;
  } else if (!homework.value.includes(s)) {
    homework.value += (homework.value.match(/[。、！？]$/) ? '' : '＋') + s;
  }
}
function deleteSentence(index, showConfirm = false) {
    if (showConfirm && !confirm(`確定刪除句庫：${sentences[index]} 嗎？`)) return;
    sentences.splice(index, 1);
    saveSentences();
    renderSentences();
}

function generate() {
    const customClassName = document.getElementById("customClassName").value.trim();
    const date = document.getElementById("dateInput").value.trim();
    const pages = document.getElementById("pages").value.trim();
    const quiz = document.getElementById("quiz").value.trim();
    const homework = document.getElementById("homework").value.trim();

    const currentChecks = document.querySelectorAll("#topicArea input[type=checkbox]:checked");
    if (currentChecks.length > 0) {
        currentChecks.forEach(cb => {
            const item = { path: cb.value, topic: cb.dataset.topicName };
            if (!progressCache.some(p => p.path === item.path && p.topic === item.topic)) {
                progressCache.push(item);
            }
            cb.checked = false;
        });
        saveCache();
    }

    const className = customClassName || (() => {
        const grade = document.getElementById("gradeSelect").value || "";
        const type = document.getElementById("classTypeSelect").value || "";
        const subj = document.getElementById("subjectSelect").value || "";
        return (grade + subj + type).trim();
    })();

    let progressToOutput = [];
    if (progressCache.length > 0) {
        progressToOutput = [...progressCache];
    } else {
        const subjectSelect = document.getElementById('subject');
        const subjectKey = subjectSelect ? subjectSelect.value : '';
        const subjectName = subjectSelect ? subjectSelect.options[subjectSelect.selectedIndex].text : '';
        const selectedBookName = document.getElementById('bookSelect') ? document.getElementById('bookSelect').value : '';
        const manualBookName = document.getElementById('manualBookInput') ? document.getElementById('manualBookInput').value.trim() : '';
        const bookName = manualBookName || selectedBookName;
        const isManualBook = !!manualBookName;
        const selectedChapterName = document.getElementById('chapterSelect') ? document.getElementById('chapterSelect').value : '';
        const manualChapterName = document.getElementById('manualChapterInput') ? document.getElementById('manualChapterInput').value.trim() : '';
        const chapterName = manualChapterName || selectedChapterName;
        const sectionName = document.getElementById('sectionSelect') ? document.getElementById('sectionSelect').value : '';
        
        let progressPath = '';
        let progressName = '';
        
        const cleanBookName = cleanSelectedOrManualBook(bookName, isManualBook);
        if (sectionName) {
            progressPath = [cleanBookName, chapterName, sectionName].filter(Boolean).join(' / ');
            progressName = sectionName;
        } else if (chapterName) {
            progressPath = [cleanBookName, chapterName].filter(Boolean).join(' / ');
            progressName = chapterName;
        } else if (bookName) {
            progressPath = cleanBookName;
            progressName = cleanBookName;
        }
        if (progressPath && progressName) {
             progressToOutput.push({ path: progressPath, topic: progressName });
        }
    }

    const groupedProgress = new Map();
    progressToOutput.forEach(item => {
      const path = item.path;
      const topic = item.topic || path.split(' / ').pop();
      if (groupedProgress.has(path)) {
        if (!groupedProgress.get(path).includes(topic)) groupedProgress.get(path).push(topic);
      } else {
        groupedProgress.set(path, [topic]);
      }
    });

    const progressLines = [];
    groupedProgress.forEach((topics, path) => {
      const combinedTopics = topics.join(' ＋ ');
      const parts = path.split(' / ');
      const lastPart = parts.slice(-1)[0];
      const subjectDropdown = document.getElementById('subject');
      const selectedSubjectText = subjectDropdown ? subjectDropdown.options[subjectDropdown.selectedIndex].text : '';
      
      if (topics.length === 1 && (topics[0] === lastPart || topics[0] === selectedSubjectText)) {
          progressLines.push(`‧ ${displayProgressPath(path)}`);
      } else {
          progressLines.push(`‧ ${displayProgressPath(path)} (${combinedTopics})`);
      }
    });
    const progressOutput = progressLines.join('\n');

    const sections = [];
    if (className) sections.push({ label: '班級', value: className });
    if (date) sections.push({ label: '日期', value: date });
    if (progressOutput) sections.push({ label: '今日進度', value: progressOutput, type: 'progress' });
    if (pages) sections.push({ label: '頁數', value: pages });
    if (quiz) sections.push({ label: '小考', value: quiz });
    if (homework) sections.push({ label: '作業', value: homework });

    const plainText = sections
      .map(section => `${section.label}\n${section.value}`)
      .join('\n\n')
      .trim();
    const outputStyle = document.getElementById('outputStyle')?.value || 'original';
    currentArchivePayload = {
      id: `${Date.now()}`,
      createdAt: new Date().toISOString(),
      title: className || '教學日誌',
      date: date || formatDate(new Date()),
      sections,
      plainText,
      outputStyle,
    };
    
    const out = document.getElementById("output");
    out.style.display="block";
    out.className = `output ${outputStyle === 'compact' ? 'compact' : ''}`;
    out.dataset.copyText = plainText;
    out.innerHTML = renderOutputHtml(sections, date, outputStyle);
    out.scrollIntoView({behavior:"smooth"});

    if (progressCache.length > 0) {
        progressCache = [];
        saveCache();
    }
}

function renderOutputHtml(sections, date, outputStyle = 'original') {
    const meta = {
        '班級': { icon: '🏫', cls: 'class' },
        '日期': { icon: '🗓️', cls: 'date' },
        '今日進度': { icon: '📘', cls: 'progress' },
        '頁數': { icon: '📄', cls: 'pages' },
        '小考': { icon: '🧾', cls: 'quiz' },
        '作業': { icon: '🏠', cls: 'homework' },
    };
    const rows = sections.map(section => {
        const itemMeta = meta[section.label] || { icon: '✨', cls: '' };
        const valueHtml = section.type === 'progress'
            ? `<ul class="output-progress">${section.value.split('\n').filter(Boolean).map(line => `<li>${htmlEscape(line)}</li>`).join('')}</ul>`
            : htmlEscape(section.value);
        if (outputStyle === 'compact') {
            return `<div class="output-item ${itemMeta.cls}">
                      <div class="output-icon">${itemMeta.icon}</div>
                      <div class="output-label">${htmlEscape(section.label)}</div>
                      <div class="output-value">${valueHtml}</div>
                    </div>`;
        }
        return `<div class="output-item ${itemMeta.cls}">
                  <div class="output-icon">${itemMeta.icon}</div>
                  <div>
                    <div class="output-label">${htmlEscape(section.label)}</div>
                    <div class="output-value">${valueHtml}</div>
                  </div>
                </div>`;
    }).join('');
    return `<div class="output-header">
              <div>
                <div class="output-title">教學日誌</div>
                <div class="output-subtitle">${htmlEscape(date || formatDate(new Date()))}</div>
              </div>
              <div class="output-badge">今日紀錄</div>
            </div>
            <div class="output-grid">${rows}</div>`;
}

function sectionValue(sections, label) {
    return sections.find(section => section.label === label)?.value || '';
}

function subjectFromClassName(className) {
    const subjects = ['國文', '國語', '英文', '英語', '數學', '社會', '自然', '物理', '化學', '生物', '地科', '歷史', '地理', '公民'];
    return subjects.find(subject => className.includes(subject)) || '未分類';
}

function archiveGroupKey(item, groupBy) {
    if (groupBy === 'class') return item.className || '未填班級';
    if (groupBy === 'subject') return item.subject || '未分類';
    return item.date || '未填日期';
}

function saveCurrentArchive() {
    if (!currentArchivePayload) {
        alert('請先產生日誌');
        return;
    }
    const className = sectionValue(currentArchivePayload.sections, '班級');
    const item = {
        ...currentArchivePayload,
        id: `${Date.now()}`,
        className,
        subject: subjectFromClassName(className),
        outputStyle: document.getElementById('outputStyle')?.value || currentArchivePayload.outputStyle || 'original',
    };
    archives.unshift(item);
    saveArchives();
}

function renderArchives() {
    const list = document.getElementById('archiveList');
    if (!list) return;
    if (!archives.length) {
        list.innerHTML = '目前沒有存檔。';
        return;
    }
    const groupBy = document.getElementById('archiveGroupBy')?.value || 'date';
    const groups = new Map();
    archives.forEach(item => {
        const key = archiveGroupKey(item, groupBy);
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(item);
    });
    let html = '';
    groups.forEach((items, key) => {
        html += `<div class="archive-title">${htmlEscape(key)} (${items.length})</div>`;
        items.forEach(item => {
            html += `<div class="archive-item">
              <div>
                <div class="archive-title">${htmlEscape(item.title || '教學日誌')}</div>
                <div class="archive-meta">${htmlEscape(item.date || '')}　${htmlEscape(item.subject || '')}</div>
              </div>
              <div class="archive-actions">
                <button onclick="loadArchive('${item.id}')">查看</button>
                <button onclick="copyArchive('${item.id}')">複製</button>
                <button onclick="downloadArchiveText('${item.id}')">文字檔</button>
                <button class="green" onclick="saveArchiveImage('${item.id}')">圖片</button>
                <button class="danger" onclick="deleteArchive('${item.id}')">刪除</button>
              </div>
            </div>`;
        });
    });
    list.innerHTML = html;
}

function findArchive(id) {
    return archives.find(item => item.id === id);
}

function loadArchive(id) {
    const item = findArchive(id);
    if (!item) return;
    currentArchivePayload = item;
    const out = document.getElementById('output');
    const style = item.outputStyle || 'original';
    const styleSelect = document.getElementById('outputStyle');
    if (styleSelect) styleSelect.value = style;
    out.style.display = 'block';
    out.className = `output ${style === 'compact' ? 'compact' : ''}`;
    out.dataset.copyText = item.plainText || '';
    out.innerHTML = renderOutputHtml(item.sections || [], item.date, style);
    out.scrollIntoView({ behavior: 'smooth' });
}

function copyArchive(id) {
    const item = findArchive(id);
    if (item?.plainText) navigator.clipboard.writeText(item.plainText).then(() => alert('已複製！'));
}

function downloadTextFile(filename, text) {
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
    URL.revokeObjectURL(link.href);
}

function downloadArchiveText(id) {
    const item = findArchive(id);
    if (!item) return;
    downloadTextFile(`教學日誌_${item.date || formatDate(new Date())}.txt`, item.plainText || '');
}

function saveArchiveImage(id) {
    loadArchive(id);
    setTimeout(saveOutputImage, 50);
}

function deleteArchive(id) {
    archives = archives.filter(item => item.id !== id);
    saveArchives();
}

function clearArchives(showConfirm = false) {
    if (showConfirm && !confirm('確定清空所有存檔嗎？')) return;
    archives = [];
    saveArchives();
}

function copyOutput(){
    const out = document.getElementById("output");
    const text = out.dataset.copyText || out.textContent;
    if(!text) return;
    navigator.clipboard.writeText(text).then(() => {
        alert("已複製！");
    });
}

function saveOutputImage() {
    const out = document.getElementById("output");
    if (!out || out.style.display === "none" || !out.innerHTML.trim()) {
        alert("請先產生內容");
        return;
    }

    loadHtml2Canvas().then(() => {
        return html2canvas(out, {
            backgroundColor: '#ffffff',
            scale: Math.max(2, window.devicePixelRatio || 1),
            useCORS: true,
        });
    }).then(canvas => {
        const link = document.createElement('a');
        link.download = `教學日誌_${formatDate(new Date())}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }).catch(() => {
        alert("圖片產生失敗，請再試一次");
    });
}

function loadHtml2Canvas() {
    if (window.html2canvas) return Promise.resolve();
    return new Promise((resolve, reject) => {
        const existing = document.querySelector('script[data-html2canvas]');
        if (existing) {
            existing.addEventListener('load', resolve, { once: true });
            existing.addEventListener('error', reject, { once: true });
            return;
        }
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
        script.async = true;
        script.dataset.html2canvas = 'true';
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
    });
}

function clearAll(showConfirm = false){
    if (showConfirm && !confirm("確定清空所有內容嗎？")) return;
    document.getElementById("dateInput").value = "";
    document.getElementById("bookArea").innerHTML = "";
    document.getElementById("pages").value = "";
    document.getElementById("quiz").value = "";
    document.getElementById("homework").value = "";
    document.getElementById("customClassName").value = "";
    if (document.getElementById("progressSearch")) document.getElementById("progressSearch").value = "";
    if (document.getElementById("searchResults")) document.getElementById("searchResults").innerHTML = "";
    if (document.getElementById("customProgressPath")) document.getElementById("customProgressPath").value = "";
    if (document.getElementById("customProgressTopic")) document.getElementById("customProgressTopic").value = "";
    if (document.getElementById("manualBookInput")) document.getElementById("manualBookInput").value = "";
    if (document.getElementById("manualChapterInput")) document.getElementById("manualChapterInput").value = "";
    document.getElementById("output").textContent = "";
    document.getElementById("output").dataset.copyText = "";
    document.getElementById("output").style.display="none";
    progressCache = [];
    saveCache();
    setToday();
    syncProgressFromTemplate();
}

document.addEventListener('DOMContentLoaded', () => {
    setToday();
    renderCache();
    renderTemplates();
    renderSentences();
    renderArchives();
    syncProgressFromTemplate();
});
</script>
